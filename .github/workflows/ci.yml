name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Run all tests
        run: ./gradlew test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore

  demo:
    name: Run telemetry demos
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run Week 4 demo (no loss)
        run: ./gradlew :telemetry-tools:run

      - name: Run Week 4 demo (simulated loss)
        run: ./gradlew :telemetry-tools:runLossy

      - name: Upload telemetry CSVs
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-demo-output
          path: telemetry-tools/build/telemetry-out/*.csv
          if-no-files-found: error
